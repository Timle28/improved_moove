name: Deploy Sphinx docs to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  # Opt in early so Node 20 deprecation warnings do not become a surprise.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Sphinx and theme
        run: pip install sphinx sphinx-rtd-theme

      - name: Build HTML
        run: sphinx-build -b html docs/source docs/build/html

      - name: Upload docs artifact (for debugging and local download)
        uses: actions/upload-artifact@v4
        with:
          name: sphinx-html
          path: docs/build/html

      - name: Upload Pages artifact (prod repo only)
        if: github.repository == 'veitlab/moove'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build/html

  deploy:
    if: github.repository == 'veitlab/moove'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
